name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore and Build all projects
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' projects < <(find . -name "*.csproj" -print0)
          if [ "${#projects[@]}" -eq 0 ]; then
            echo "No .csproj files found."
            exit 1
          fi

          for project in "${projects[@]}"; do
            echo "Building $project"
            dotnet build "$project" --configuration Release
          done

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' projects < <(find . -name "*.csproj" -print0)
          if [ "${#projects[@]}" -eq 0 ]; then
            echo "No .csproj files found."
            exit 1
          fi

          test_count=0
          for project in "${projects[@]}"; do
            if grep -q "Microsoft.NET.Test.Sdk" "$project"; then
              echo "Testing $project"
              dotnet test "$project" --configuration Release
              test_count=$((test_count + 1))
            fi
          done

          if [ "$test_count" -eq 0 ]; then
            echo "No test projects detected (missing Microsoft.NET.Test.Sdk). Skipping dotnet test."
          fi
