name: Auto Request Copilot Review

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  pull-requests: write

jobs:
  request-copilot-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot as reviewer
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                reviewers: ["copilot"]
              });
              core.info("Requested Copilot reviewer successfully.");
            } catch (error) {
              if (error.status === 422) {
                core.warning("Cannot request reviewer 'copilot'. Ensure Copilot code review is enabled for this repository/account.");
              } else {
                throw error;
              }
            }
