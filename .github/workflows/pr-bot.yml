name: PR Bot

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-bot:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Post or update PR checklist comment
        uses: actions/github-script@v9
        with:
          script: |
            const marker = "<!-- pr-bot-review-checklist -->";
            const body = [
              marker,
              "## PR Bot Checklist",
              "",
              "Please verify this PR against repository review priorities:",
              "",
              "- [ ] Build safety for .NET 10 projects (`*.csproj` target `net10.0`).",
              "- [ ] Logic bugs and potential runtime exceptions.",
              "- [ ] Breaking changes in public method signatures or behavior.",
              "- [ ] Input handling and basic defensive checks.",
              "- [ ] Clear naming and maintainable code structure.",
              "",
              "Review style:",
              "- concise, actionable comments",
              "- concrete fix suggestions when possible",
              "- avoid style-only comments unless they impact readability or maintenance"
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === "Bot" &&
                typeof comment.body === "string" &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
